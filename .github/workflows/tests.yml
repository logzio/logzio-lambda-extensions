name: Tests

on: [pull_request]


jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Test
        working-directory: ./logzio-lambda-extensions-logs/utils
        run: go test -v -race -covermode=atomic -coverprofile=coverage.out
